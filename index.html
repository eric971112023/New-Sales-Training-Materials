.card{background:#fff;border:1px solid #d7dde2;border-radius:14px;padding:20px 22px;margin-bottom:14px;text-decoration:none;display:block;transition:box-shadow .2s}
.card:hover{box-shadow:0 4px 18px rgba(17,24,39,.1)}
.card-title{font-size:16px;font-weight:700;color:#1f2933;margin-bottom:6px}
.card-desc{font-size:13px;color:#6b7280}
.card-arrow{float:right;color:#003399;font-size:18px;margin-top:2px}
